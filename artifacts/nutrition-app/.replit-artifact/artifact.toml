kind = "mobile"
previewPath = "/"
title = "الحاسبة الغذائية الذكية"
version = "1.0.0"
id = "artifacts/nutrition-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19168

[services.development]
run = "pnpm --filter @workspace/nutrition-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nutrition-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/nutrition-app", "run", "serve" ]

[services.env]
PORT = "19168"
BASE_PATH = "/"
